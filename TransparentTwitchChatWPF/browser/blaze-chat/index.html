<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Blaze Chat Overlay</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            height: 100vh;
            background: transparent;
            font-family: 'Noto Sans', sans-serif;
        }

        #chat_container {
            width: 100%;
            padding: 6px;
            position: absolute;
            bottom: 0;
            overflow: hidden;
            color: white;
            font-weight: 700;
            font-size: 18px; /* default, overridden by settings */
            word-break: break-word;
        }

        .chat-line {
            padding: 3px 6px;
            margin-bottom: 3px;
            text-shadow:
                -1px -1px 1px #000,
                 1px -1px 1px #000,
                -1px  1px 1px #000,
                 1px  1px 1px #000;
            animation: fadeIn 0.3s ease-in;
            line-height: 1.5;
        }

        #chat_container.with-background {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 6px;
        }

        #chat_container.with-background .chat-line {
            text-shadow: none;
        }

        .chat-line.fading {
            opacity: 0;
            transition: opacity 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .username {
            font-weight: 700;
        }

        .separator {
            margin: 0 2px;
        }

        .message-text {
            font-weight: 400;
        }

        .badge {
            display: inline-block;
            width: 18px;
            height: 18px;
            vertical-align: middle;
            margin-right: 3px;
            border-radius: 3px;
        }

        .badge-mod { background: #00ad03; }
        .badge-vip { background: #e005b9; }
        .badge-og  { background: #ff6600; }
        .badge-sub { background: #9146ff; }

        .platform-badge {
            display: inline-block;
            font-size: 12px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 3px;
            vertical-align: middle;
            margin-right: 5px;
            text-shadow: none;
            letter-spacing: 0.5px;
        }

        .platform-blaze {
            background: #f56e28;
            color: #fff;
        }

        .platform-twitch {
            background: #9146ff;
            color: #fff;
        }

        .platform-youtube {
            background: #ff0000;
            color: #fff;
        }

        .platform-kick {
            background: #53fc18;
            color: #000;
        }

        #status_container {
            position: absolute;
            bottom: 10px;
            width: 100%;
            display: flex;
            justify-content: center;
            pointer-events: none;
            z-index: 1;
        }

        #status_text {
            background-color: rgba(0, 0, 0, 0.5);
            padding: 8px 16px;
            color: white;
            font-size: 14px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.5s;
        }

        #status_text.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="status_container">
        <span id="status_text"></span>
    </div>
    <div id="chat_container"></div>

    <script src="socket.io.min.js"></script>
    <script src="blaze-chat.js"></script>
</body>
</html>
