name: Build and Release SUCO

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-pack:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build NativeChatClient (required before WPF build)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build NativeChatClient
        run: |
          cd NativeChatClient
          npm ci
          npm run build
        shell: pwsh

      # Build WPF app
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish application
        run: dotnet publish TransparentTwitchChatWPF/TransparentTwitchChatWPF.csproj -c Release -o publish -r win-x64 --self-contained true

      # Extract version from tag
      - name: Get version from tag
        id: get-version
        run: |
            $version = "${{ github.ref_name }}".Substring(1)
            echo "version=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      # Package and upload with Velopack
      - name: Create and Upload Velopack Release
        run: |
          dotnet tool install -g vpk
          vpk download github --repoUrl https://github.com/${{ github.repository }}
          vpk pack -u SUCO -v ${{ steps.get-version.outputs.version }} --packDir publish --mainExe TransparentTwitchChatWPF.exe
          vpk upload github --repoUrl https://github.com/${{ github.repository }} --publish --releaseName "SUCO v${{ steps.get-version.outputs.version }}" --tag ${{ github.ref_name }} --token ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
